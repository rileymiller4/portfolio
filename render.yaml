services:
  - type: web
    name: ai-portfolio
    env: python
    buildCommand: "pip install -r requirements.txt && bash build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ai-portfolio-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: MEDIA_ROOT
        value: "/var/data/media"
    disk:
      name: media
      mountPath: /var/data
      sizeGB: 1

databases:
  - name: ai-portfolio-db
    plan: free
