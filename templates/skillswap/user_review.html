{% extends 'skillswap/base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 mt-4">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="card-title mb-4">Review {{ reviewee.first_name }} {{ reviewee.last_name }}</h3>
        <p class="text-muted">Share your experience collaborating with this user on Campus SkillSwap.</p>
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn btn-primary w-100 mt-3">Submit Review</button>
        </form>
        <div class="mt-3 text-center">
            <a href="{% url 'skillswap:dashboard' %}" class="text-decoration-none">Cancel and return to Dashboard</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
