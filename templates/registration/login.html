{% extends 'base.html' %}

{% block title %}Login • AI Portfolio{% endblock %}

{% block content %}
  <h1 class="h3">Login</h1>

  <div class="row">
    <div class="col-md-6 col-lg-4">
      <div class="card">
        <div class="card-body">
          <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary" type="submit">Login</button>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
